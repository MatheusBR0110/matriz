<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anônimo</title>
</head>
<body>
    <!--Aula de arrow function e setInternal-->
    <div id="caixa"></div>
<style>
    body{
        background: #222;
    }
    #caixa{
        width: 50px;
        height: 50px;
        background: red;
        position: absolute;
        left: 0px;
        top: 0px;
    }
</style>

<script>
    let caixa = document.getElementById("caixa");
    let x = 0
    let y = 100;
    let direcao = "direita"
    setInterval(()=>{
        switch(direcao){
case "direita": x+=5;if(x>300)direcao = "baixo"; break;
case "baixo": y+=5; if(y>300)direcao = "esquerda"; break;
case "esquerda": x-=5; if(x<0)direcao = "cima"; break;
case "cima": y-=5; if(y<0) direcao = "direita"; break;
        }
        caixa.style.left = x + "px";
        caixa.style.top = y + "px";
    },100);
</script> 
</body>
</html>
