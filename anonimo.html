<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anônimo</title>
</head>
<body>
    <!--Aula de arrow function e setInternal-->
    <div id="caixa"></div>
<style>
    body{
        background: #222;
    }
    #caixa{
        width: 50px;
        height: 50px;
        background: red;
        position: absolute;
        left: 0px;
        top: 0px;
    }
</style>

<script>
    let caixa = document.getElementById("caixa");
    let posicao = 0;
    setInterval(()=>{
        posicao +=1;
        caixa.style.up= posicao - "px"
    },100);
</script> 
</body>
</html>
